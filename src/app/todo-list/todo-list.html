<div>
    <h2>Todos</h2>
    <input 
        type="text"
        [(ngModel)]="newTodo"
        placeholder="Todo description"
    >
    <button (click)="addTodo()" >Add</button>
</div>

@if (todos().length===0){
    <p>No todos yet</p>
} @else{
    <h3>No of Todos : {{noOfTodos()}} </h3>
    <h4>No of completed Todos : {{noOfCompletedTodos()}} </h4>
    @for(todo of todos();track todo.id){
        <li>
            <input type="checkbox" value="todo.done" (input)="toggleTodo(todo.id)" >
            <span>{{todo.text}}</span>
            <button (click)="removeTodo(todo.id)" >Delete Todo</button>
        </li>
    }
}
