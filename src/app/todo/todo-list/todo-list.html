<div>
    <h2>Todos</h2>
    <input 
        type="text"
        [(ngModel)]="newTodo"
        placeholder="Todo description"
    >
    <button (click)="addTodo()" >Add</button>
</div>

@if (todoService.todos().length===0){
    <p>No todos yet</p>
} @else{
    <h3>No of Todos : {{todoService.noOfTodos()}} </h3>
    <h4>No of completed Todos : {{todoService.noOfCompletedTodos()}} </h4>
    @for(todo of todoService.todos();track todo.id){
        <app-todo-item 
            [todo]="todo"
            (toggled)="todoService.toggleTodo($event)"
            (deleted)="todoService.removeTodo($event)"
        />
    }
}
